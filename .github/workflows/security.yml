name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.4/gitleaks_8.21.4_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1

  trivy-fs:
    name: Trivy (filesystem deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy fs (HIGH+CRITICAL log)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

  trivy-image:
    name: Trivy ${{ matrix.app }} image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        app: [api, dashboard, worker, tracking, landing]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.${{ matrix.app }}
          push: false
          load: true
          tags: scan-target:${{ matrix.app }}
      - name: Trivy image scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ matrix.app }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy image scan (HIGH+CRITICAL log)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ matrix.app }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

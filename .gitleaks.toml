    '''PLACEHOLDER_GENERATE_RSA_2048''',
    '''<sha256 of your password: echo -n .* sha256sum>''',
    '''belia-it-backoffice-secret-key-change-in-production''',
    '''bm_live_YOUR_KEY''',
]
commits = [
